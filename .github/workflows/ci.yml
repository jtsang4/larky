name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - run: go fmt ./... && git diff --exit-code
      - run: go test ./...
      - run: go vet ./...
      - run: go test -race ./...
      - run: make build
