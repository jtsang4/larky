name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24.x"
          cache: false
      - run: go fmt ./... && git diff --exit-code
      - run: go test ./...
      - run: go vet ./...
      - run: go test -race ./...
      - run: make build
      - run: sh -n install.sh scripts/package.sh scripts/test-install.sh
      - run: make test-install VERSION=v0.0.0-test
