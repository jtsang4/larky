name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24.x"
          cache: false
      - run: go test ./...
      - run: make package VERSION=${{ github.ref_name }}
      - uses: actions/upload-artifact@v7
        with:
          name: larky-darwin-${{ matrix.arch }}
          path: dist/*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          cp install.sh release/install.sh
          sh -n release/install.sh
          cd release
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums.txt
            release/install.sh
